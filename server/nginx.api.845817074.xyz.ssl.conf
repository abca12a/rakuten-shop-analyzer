limit_req_zone $binary_remote_addr zone=rakuten_proxy_per_ip:10m rate=10r/s;

upstream rakuten_proxy_backend {
  least_conn;
  server 127.0.0.1:3101 max_fails=3 fail_timeout=5s;
  server 127.0.0.1:3102 max_fails=3 fail_timeout=5s;
  server 127.0.0.1:3103 max_fails=3 fail_timeout=5s;
  keepalive 32;
}

server {
  listen 80;
  server_name api.845817074.xyz;

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  server_name api.845817074.xyz;

  ssl_certificate /etc/letsencrypt/live/api.845817074.xyz/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.845817074.xyz/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location = /health {
    proxy_pass http://rakuten_proxy_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 3s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
  }

  location = /internal/status {
    allow 127.0.0.1;
    allow ::1;
    deny all;
    proxy_pass http://rakuten_proxy_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";
    proxy_connect_timeout 3s;
    proxy_send_timeout 10s;
    proxy_read_timeout 10s;
  }

  location = /rakuten/proxy {
    limit_req zone=rakuten_proxy_per_ip burst=20 nodelay;
    proxy_pass http://rakuten_proxy_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
  }

  location / {
    proxy_pass http://rakuten_proxy_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
    proxy_next_upstream error timeout http_502 http_503 http_504;
  }
}
